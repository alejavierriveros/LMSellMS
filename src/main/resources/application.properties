spring.application.name=LMSellMS

# ==========================================
# PUERTO DE RED LOCAL (Para pruebas locales seguras)
# ==========================================
# Con Eureka, dejamos el puerto 0 para que sea Eureka quien designe puertos automáticamente con la configuración que sigue abajo.
# server.port=0
server.port=8082

# ==========================================
# CONFIGURACIÓN EUREKA (Comentado para fase de pruebas locales)
# ==========================================
# eureka.client.service-url.defaultZone=http://localhost:8090/eureka/
# eureka.instance.instance-id=${spring.application.name}:${random.value}
# eureka.instance.prefer-ip-address=true

# ==========================================
# BASE DE DATOS REAL MYSQL (Comentado para no joder la BD real en pruebas)
# ==========================================
# spring.datasource.url=jdbc:mysql://localhost:3306/ventas_db
# spring.datasource.username=root
# spring.datasource.password=
# spring.jpa.hibernate.ddl-auto=validate
# spring.jpa.hibernate.ddl-auto=update

# ==========================================
# BASE DE DATOS LOCAL H2 EN MEMORIA (Activa para los Tests y JaCoCo)
# ==========================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# CONFIGURACIÓN DE FLYWAY (Desactivado para entorno de pruebas)
# ==========================================
spring.flyway.enabled=false

# El sig. código muestra un pseudocódigo SQL por consola para saber qué procedimiento SQL se está ejecutando.
spring.jpa.show-sql=true

# El sig. código le da el formato típico SQL al pseudocódigo mostrado por consola (si está activado el show-sql).
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONFIGURACIÓN DE LOGS Y TRAZABILIDAD
# ==========================================
logging.level.root=INFO
logging.level.cl.duoc.lmsellms=DEBUG
logging.level.org.hibernate=ERROR

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{50} - %msg%n
logging.file.name=LMSellMS.log
logging.logback.rollingpolicy.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{50} - %msg%n