spring.application.name=LMSellMS

# ==========================================
# PUERTO DE RED AUTOMÁTICO (Restaurado para Eureka)
# ==========================================
# Con Eureka, dejamos el puerto 0 para que sea Eureka quien designe puertos automáticamente.
server.port=0
# server.port=8082

# ==========================================
# CONFIGURACIÓN EUREKA (Activado para la arquitectura de microservicios)
# ==========================================
eureka.client.service-url.defaultZone=http://localhost:8090/eureka/
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.instance.prefer-ip-address=true

# ==========================================
# BASE DE DATOS REAL MYSQL (Reactiva para producción/desarrollo integrado)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/ventas_db
spring.datasource.username=root
spring.datasource.password=
# spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# BASE DE DATOS LOCAL H2 EN MEMORIA (Comentado para fase de pruebas pasada)
# ==========================================
# spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.hibernate.ddl-auto=update

# ==========================================
# CONFIGURACIÓN DE FLYWAY (Restaurado para control de migraciones BD)
# ==========================================
spring.flyway.enabled=true
# spring.flyway.enabled=false

# El sig. código muestra un pseudocódigo SQL por consola para saber qué procedimiento SQL se está ejecutando.
spring.jpa.show-sql=true

# El sig. código le da el formato típico SQL al pseudocódigo mostrado por consola (si está activado el show-sql).
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONFIGURACIÓN DE LOGS Y TRAZABILIDAD
# ==========================================
logging.level.root=INFO
logging.level.cl.duoc.lmsellms=DEBUG
logging.level.org.hibernate=ERROR

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{50} - %msg%n
logging.file.name=LMSellMS.log
logging.logback.rollingpolicy.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{50} - %msg%n