spring.application.name=LMSELLMS

# Conexión adaptada para la red de Docker (Se reemplaza localhost por el nombre del contenedor de la BD)
spring.datasource.url=jdbc:mysql://mysql:3306/ventas_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never
spring.flyway.enabled=true

# Con Eureka dentro de Docker, dejamos el puerto 0 para asignación dinámica
server.port=0

# Conexión adaptada para Docker (Se reemplaza localhost por el nombre del contenedor de Eureka)
eureka.client.service-url.defaultZone=http://eureka-server:8090/eureka/

## Crea un ID único y aleatorio para el servicio y evita que choquen entre sí.
eureka.instance.instance-id=${spring.application.name}:${random.value}

# Obliga a Eureka a mostrar la IP del contenedor en su dashboard.
eureka.instance.prefer-ip-address=true

# SWAGGER (v3/api-docs adaptado a ventas v2)
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/v1/ventas/v3/api-docs

###### LOGS ######
logging.level.root=INFO
logging.level.cl.duoc.lmsellms=DEBUG
logging.level.org.hibernate=ERROR

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{50} - %msg%n

# Guardar logs en archivo interno del contenedor
logging.file.name=logs/LMSELLMS.log
logging.logback.rollingpolicy.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{50} - %msg%n